<div class="auth-bg">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="locus-image.jpg" alt="Locus Park" class="logo-img" />
    </div>

    <div class="auth-header">
      <h1>Acessar Sistema</h1>
      <p>Entre com suas credenciais de operador</p>
    </div>

    <div class="auth-body">
      <div class="form-field">
        <label>Usuário</label>
        <div class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#94a3b8" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <input
            type="text"
            [(ngModel)]="usuario"
            placeholder="Seu usuário cadastrado"
          />
        </div>
      </div>

      <div class="form-field">
        <label>Senha</label>
        <div class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#94a3b8" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input
            [type]="senhaVisivel ? 'text' : 'password'"
            [(ngModel)]="senha"
            placeholder="••••••••"
          />
          <button class="btn-toggle-senha" (click)="senhaVisivel = !senhaVisivel" type="button">
            <svg *ngIf="!senhaVisivel" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#94a3b8" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg *ngIf="senhaVisivel" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#94a3b8" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
      </div>

      <div *ngIf="erroLogin" class="error-msg">
        {{ erroLogin }}
      </div>

      <button class="btn-entrar" [appLoading]="loginMutation.isPending()" loadingText="Entrando..." (click)="entrar()">Entrar</button>

      <p class="auth-footer">
        Não tem uma conta?
        <a routerLink="/cadastro"><strong>Cadastrar Estacionamento</strong></a>
      </p>
    </div>

  </div>
</div>
