<div class="saida-page">

  <div class="page-header">
    <h1>Saída</h1>
  </div>

  <div class="saida-layout">

    <!-- Card de busca -->
    <div class="busca-card">
      <div class="busca-header">
        <h2>Buscar Veículo</h2>
        <p>Digite a placa ou modelo para localizar o veículo</p>
      </div>

      <div class="search-box" [class.focused]="buscaFocada">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#94a3b8" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
        </svg>
        <input
          type="text"
          [(ngModel)]="termoBusca"
          placeholder="Buscar por placa ou modelo..."
          (focus)="buscaFocada = true"
          (blur)="onBlur()"
          (ngModelChange)="onBusca()"
          autocomplete="off"
        />
        <button *ngIf="termoBusca" class="btn-clear" (click)="limparBusca()">×</button>
      </div>

      <!-- Resultados da busca -->
      <div class="resultados" *ngIf="termoBusca && resultados.length > 0">
        <div
          class="resultado-item"
          *ngFor="let v of resultados"
          (click)="selecionarVeiculo(v)"
        >
          <div class="resultado-left">
            <div class="resultado-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="12" viewBox="0 0 22 14" fill="none">
                <path d="M3.5 13H2a1 1 0 01-1-1v-2.5L3 4h16l1.5 5.5V12a1 1 0 01-1 1h-1.5" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="6" cy="12.5" r="1.5" stroke="#64748b" stroke-width="1.5"/>
                <circle cx="16" cy="12.5" r="1.5" stroke="#64748b" stroke-width="1.5"/>
                <path d="M3.5 13h9" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <div>
              <strong>{{ v.vehicle.plate }}</strong>
              <span>{{ v.vehicle.model }} · {{ v.vehicle.color }}</span>
            </div>
          </div>
          <span class="btn-selecionar">Selecionar →</span>
        </div>
      </div>

      <!-- Nenhum resultado -->
      <div class="sem-resultado" *ngIf="termoBusca && resultados.length === 0">
        <p>Nenhum veículo ativo encontrado para "{{ termoBusca }}".</p>
      </div>
    </div>

  </div>

</div>

<!-- Modal de saída -->
<app-modal-saida
  *ngIf="modalAberto && veiculoSelecionado"
  [veiculo]="veiculoSelecionado"
  (fechar)="fecharModal()"
  (confirmado)="onConfirmado()"
/>
